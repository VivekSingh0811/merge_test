<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Branch Todo List</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>My Tasks</h1>
            <p id="date-display"></p>
        </header>

        <section class="input-section">
            <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off">
            <button id="add-btn" aria-label="Add Task">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
        </section>

        <section class="tasks-section">
            <ul id="task-list">
                <!-- Tasks will be injected here via JavaScript -->
            </ul>
        </section>

        <footer>
            <p><span id="task-count">0</span> tasks remaining</p>
            <button id="clear-completed">Clear Completed</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
